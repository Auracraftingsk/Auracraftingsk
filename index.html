<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraCrafting | Official Web</title>
    <style>
        body { background-color: #0f0f0f; color: #ffffff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #1a1a1a; padding: 30px; border-radius: 20px; border: 2px solid #ffaa00; box-shadow: 0 0 20px rgba(255, 170, 0, 0.2); }
        h1 { color: #ffaa00; font-size: 2.5rem; margin-bottom: 5px; }
        .status-box { background: #252525; padding: 15px; border-radius: 10px; margin: 20px 0; border-left: 5px solid #55aa55; }
        .ip-copy { color: #ffaa00; font-weight: bold; cursor: pointer; background: #333; padding: 5px 10px; border-radius: 5px; }
        .links { margin-top: 20px; }
        .btn { display: inline-block; padding: 12px 25px; margin: 5px; border-radius: 8px; text-decoration: none; font-weight: bold; color: white; transition: 0.3s; }
        .ig { background: #E1306C; }
        .tt { background: #000; border: 1px solid #fff; }
        .online { color: #55ff55; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AuraCrafting</h1>
        <p>Oficiálna stránka Minecraft serveru</p>

        <div class="status-box">
            <p>Stav serveru: <span id="status" class="online">Načítavam...</span></p>
            <p>Hráči online: <span id="player-count">?</span></p>
            <p>IP adresa: <span class="ip-copy" onclick="copyIP()">auracraftingsk.aternos.me:15773</span></p>
        </div>
        
        <div class="links">
            <a href="https://www.instagram.com/Auracraftingsk" class="btn ig" target="_blank">INSTAGRAM</a>
            <a href="https://www.tiktok.com/Auracraftingsk" class="btn tt" target="_blank">TIKTOK</a>
        </div>
    </div>

    <script>
        // Funkcia na načítanie stavu serveru
        async function updateStatus() {
            try {
                const response = await fetch('https://api.mcsrvstat.us/2/auracraftingsk.aternos.me:15773');
                const data = await response.json();
                
                if (data.online) {
                    document.getElementById('status').innerText = "ONLINE";
                    document.getElementById('player-count').innerText = data.players.online + " / " + data.players.max;
                } else {
                    document.getElementById('status').innerText = "OFFLINE";
                    document.getElementById('status').style.color = "#ff5555";
                    document.getElementById('player-count').innerText = "0";
                }
            } catch (error) {
                console.log("Chyba pri načítaní statusu.");
            }
        }

        // Funkcia na kopírovanie IP
        function copyIP() {
            navigator.clipboard.writeText("auracraftingsk.aternos.me:15773");
            alert("IP adresa bola skopírovaná!");
        }

        updateStatus();
    </script>
</body>
</html>
